services:
  - type: web
    name: alpha-banall-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m RAUSHAN
    plan: free
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: OWNER
        sync: false
